services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: zym
      POSTGRES_USER: zym
      POSTGRES_PASSWORD: zym
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zym -d zym"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  chroma:
    image: chromadb/chroma:1.5.5
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data

  api:
    build:
      context: ./server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3001
      WEBSOCKET_PORT: 8080
      ENABLE_API_SERVER: "true"
      ENABLE_WEBSOCKET_SERVER: "false"
      ENABLE_BACKGROUND_CLEANUP: "false"
      COACH_QUEUE_WORKER_ENABLED: "false"
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgres://zym:zym@postgres:5432/zym
      APP_DATA_ROOT: /app/data
      REDIS_URL: redis://redis:6379
      REALTIME_BUS_PROVIDER: redis
      COACH_QUEUE_PROVIDER: bullmq
      RATE_LIMIT_PROVIDER: redis
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:3001
      MEDIA_STORAGE_PROVIDER: local
      CHROMA_URL: http://chroma:8000
      CHROMA_COLLECTION_NAME: zym-knowledge
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      MEDIA_URL_SIGNING_SECRET: ${MEDIA_URL_SIGNING_SECRET:-local-dev-media-secret}
      KNOWLEDGE_ADMIN_IDS: ${KNOWLEDGE_ADMIN_IDS:-1}
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data

  ws:
    build:
      context: ./server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3001
      WEBSOCKET_PORT: 8080
      ENABLE_API_SERVER: "false"
      ENABLE_WEBSOCKET_SERVER: "true"
      ENABLE_BACKGROUND_CLEANUP: "false"
      COACH_QUEUE_WORKER_ENABLED: "false"
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgres://zym:zym@postgres:5432/zym
      APP_DATA_ROOT: /app/data
      REDIS_URL: redis://redis:6379
      REALTIME_BUS_PROVIDER: redis
      COACH_QUEUE_PROVIDER: bullmq
      RATE_LIMIT_PROVIDER: redis
      PUBLIC_BASE_URL: http://localhost:3001
      MEDIA_STORAGE_PROVIDER: local
      CHROMA_URL: http://chroma:8000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      MEDIA_URL_SIGNING_SECRET: ${MEDIA_URL_SIGNING_SECRET:-local-dev-media-secret}
    ports:
      - "8080:8080"
    volumes:
      - app-data:/app/data

  worker:
    build:
      context: ./server
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ENABLE_BACKGROUND_CLEANUP: "false"
      COACH_QUEUE_WORKER_ENABLED: "true"
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgres://zym:zym@postgres:5432/zym
      APP_DATA_ROOT: /app/data
      REDIS_URL: redis://redis:6379
      REALTIME_BUS_PROVIDER: redis
      COACH_QUEUE_PROVIDER: bullmq
      RATE_LIMIT_PROVIDER: redis
      MEDIA_STORAGE_PROVIDER: local
      CHROMA_URL: http://chroma:8000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      MEDIA_URL_SIGNING_SECRET: ${MEDIA_URL_SIGNING_SECRET:-local-dev-media-secret}
    volumes:
      - app-data:/app/data

  scheduler:
    build:
      context: ./server
    command: ["node", "dist/scheduler.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgres://zym:zym@postgres:5432/zym
      APP_DATA_ROOT: /app/data
      MEDIA_STORAGE_PROVIDER: local
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      MEDIA_URL_SIGNING_SECRET: ${MEDIA_URL_SIGNING_SECRET:-local-dev-media-secret}
    volumes:
      - app-data:/app/data

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
        NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      api:
        condition: service_started
      ws:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  chroma-data:
  app-data:
