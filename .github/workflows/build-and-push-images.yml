name: Build And Push Images

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "web/**"
      - ".github/workflows/build-and-push-images.yml"
      - ".github/workflows/deploy-prod.yml"
      - "infra/scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-and-push-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  WEB_REPOSITORY: zym-web
  SERVER_REPOSITORY: zym-server
  NEXT_PUBLIC_API_BASE_URL: https://api.zym8.com
  NEXT_PUBLIC_WS_URL: wss://ws.zym8.com
  IMAGE_PLATFORM: linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub OIDC role variable
        run: |
          if [ -z "${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}" ]; then
            echo "Repository variable AWS_GITHUB_ACTIONS_ROLE_ARN is required." >&2
            echo "Create an IAM role for GitHub Actions OIDC, then save its ARN in repository variables." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "web_image=${ECR_REGISTRY}/${WEB_REPOSITORY}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "server_image=${ECR_REGISTRY}/${SERVER_REPOSITORY}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${IMAGE_PLATFORM}" \
            --tag "${{ steps.meta.outputs.web_image }}" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" \
            --build-arg NEXT_PUBLIC_WS_URL="${NEXT_PUBLIC_WS_URL}" \
            --push \
            ./web

      - name: Build and push server image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${IMAGE_PLATFORM}" \
            --tag "${{ steps.meta.outputs.server_image }}" \
            --push \
            ./server

      - name: Publish workflow summary
        if: always()
        run: |
          {
            echo "## Images pushed"
            echo
            echo "- Web: \`${{ steps.meta.outputs.web_image }}\`"
            echo "- Server: \`${{ steps.meta.outputs.server_image }}\`"
            echo "- Platform: \`${IMAGE_PLATFORM}\`"
            echo
            echo "Deploy these images with the manual \`Deploy Production ECS\` workflow."
          } >> "$GITHUB_STEP_SUMMARY"
