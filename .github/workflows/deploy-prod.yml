name: Deploy Production ECS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag. Defaults to the selected ref short SHA."
        required: false
        type: string
      deploy_web:
        description: "Deploy the web service"
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: "Deploy api/ws/worker/scheduler"
        required: true
        default: true
        type: boolean
      wait_for_stable:
        description: "Wait for ECS services to become stable"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  ECS_CLUSTER: zym-prod
  WEB_REPOSITORY: zym-web
  SERVER_REPOSITORY: zym-server
  PROD_ALB_DNS_NAME: zym-app-alb-1098890527.us-east-2.elb.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.zym8.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub OIDC role variable
        run: |
          if [ -z "${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}" ]; then
            echo "Repository variable AWS_GITHUB_ACTIONS_ROLE_ARN is required." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deploy tag and image URIs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="$SHORT_SHA"
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${ECR_REGISTRY}/${WEB_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "server_image=${ECR_REGISTRY}/${SERVER_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Deploy selected production services
        shell: bash
        run: |
          set -euo pipefail
          args=("${{ steps.meta.outputs.image_tag }}")

          if [ "${{ github.event.inputs.deploy_web }}" = "true" ] && [ "${{ github.event.inputs.deploy_backend }}" != "true" ]; then
            args+=("--web-only")
          fi

          if [ "${{ github.event.inputs.deploy_backend }}" = "true" ] && [ "${{ github.event.inputs.deploy_web }}" != "true" ]; then
            args+=("--backend-only")
          fi

          if [ "${{ github.event.inputs.wait_for_stable }}" != "true" ]; then
            args+=("--no-wait")
          fi

          bash ./infra/scripts/deploy-prod-image-tag.sh "${args[@]}"

      - name: Smoke check production entrypoints
        id: smoke
        shell: bash
        run: |
          set -euo pipefail
          args=(--github-output "$GITHUB_OUTPUT")

          if [ "${{ github.event.inputs.deploy_web }}" = "true" ] && [ "${{ github.event.inputs.deploy_backend }}" != "true" ]; then
            args+=("--web-only")
          fi

          if [ "${{ github.event.inputs.deploy_backend }}" = "true" ] && [ "${{ github.event.inputs.deploy_web }}" != "true" ]; then
            args+=("--backend-only")
          fi

          PROD_ALB_DNS_NAME="${PROD_ALB_DNS_NAME}" bash ./infra/scripts/smoke-check-prod.sh "${args[@]}"

      - name: Publish workflow summary
        if: always()
        run: |
          {
            echo "## Production deploy submitted"
            echo
            echo "- Image tag: \`${{ steps.meta.outputs.image_tag }}\`"
            echo "- Web image: \`${{ steps.meta.outputs.web_image }}\`"
            echo "- Server image: \`${{ steps.meta.outputs.server_image }}\`"
            echo "- Web deployed: \`${{ github.event.inputs.deploy_web }}\`"
            echo "- Backend deployed: \`${{ github.event.inputs.deploy_backend }}\`"
            echo "- Waited for stable: \`${{ github.event.inputs.wait_for_stable }}\`"
            echo
            echo "## Smoke checks"
            echo
            echo "- API: \`${{ steps.smoke.outputs.api_status }}\`"
            echo "- WS: \`${{ steps.smoke.outputs.ws_status }}\`"
            echo "- Web: \`${{ steps.smoke.outputs.web_status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
