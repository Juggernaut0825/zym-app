services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
      - ws
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../admin-site:/srv/zym-site:ro
      - caddy-data:/data
      - caddy-config:/config

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../../.env.gcp.prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  chroma:
    image: chromadb/chroma:1.5.5
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
    volumes:
      - chroma-data:/data

  api:
    build:
      context: ../../server
    restart: unless-stopped
    env_file:
      - ../../.env.gcp.prod
    environment:
      NODE_ENV: production
      API_PORT: 3001
      WEBSOCKET_PORT: 8080
      ENABLE_API_SERVER: "true"
      ENABLE_WEBSOCKET_SERVER: "false"
      ENABLE_BACKGROUND_CLEANUP: "false"
      COACH_QUEUE_WORKER_ENABLED: "false"
      CHROMA_URL: http://chroma:8000
      CHROMA_COLLECTION_NAME: zym-knowledge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - app-data:/app/data

  ws:
    build:
      context: ../../server
    restart: unless-stopped
    env_file:
      - ../../.env.gcp.prod
    environment:
      NODE_ENV: production
      API_PORT: 3001
      WEBSOCKET_PORT: 8080
      ENABLE_API_SERVER: "false"
      ENABLE_WEBSOCKET_SERVER: "true"
      ENABLE_BACKGROUND_CLEANUP: "false"
      COACH_QUEUE_WORKER_ENABLED: "false"
      CHROMA_URL: http://chroma:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - app-data:/app/data

  worker:
    build:
      context: ../../server
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file:
      - ../../.env.gcp.prod
    environment:
      NODE_ENV: production
      ENABLE_API_SERVER: "false"
      ENABLE_WEBSOCKET_SERVER: "false"
      ENABLE_BACKGROUND_CLEANUP: "false"
      COACH_QUEUE_WORKER_ENABLED: "true"
      COACH_QUEUE_CONCURRENCY: "4"
      CHROMA_URL: http://chroma:8000
      CHROMA_COLLECTION_NAME: zym-knowledge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - app-data:/app/data

  scheduler:
    build:
      context: ../../server
    restart: unless-stopped
    command: ["node", "dist/scheduler.js"]
    env_file:
      - ../../.env.gcp.prod
    environment:
      NODE_ENV: production
      ENABLE_API_SERVER: "false"
      ENABLE_WEBSOCKET_SERVER: "false"
      ENABLE_BACKGROUND_CLEANUP: "true"
      COACH_QUEUE_WORKER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-data:/app/data

  web:
    build:
      context: ../../web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.zym8.com}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://ws.zym8.com}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_APPLE_CLIENT_ID: ${NEXT_PUBLIC_APPLE_CLIENT_ID:-com.zym8.web}
        NEXT_PUBLIC_APPLE_REDIRECT_URI: ${NEXT_PUBLIC_APPLE_REDIRECT_URI:-https://app.zym8.com/login}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      ws:
        condition: service_started

volumes:
  app-data:
  caddy-config:
  caddy-data:
  chroma-data:
  postgres-data:
  redis-data:
